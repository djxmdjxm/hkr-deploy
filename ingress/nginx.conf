# put this at http{} level once
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  # Global limit — overridden per-location below for the API.
  client_max_body_size 100M;
  listen 80;

  # normalize to trailing slash
  location = /api    { return 301 /api/; }

  location / {
    proxy_pass http://krebs-web:8080/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host:$server_port;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
    proxy_redirect off;
  }

  location /api/ {
    proxy_pass http://krebs-api:8080/;
    proxy_http_version 1.1;
    proxy_set_header Host $host:$server_port;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_redirect off;
    # CHANGE vs original: timeouts raised from 60s to 300s, body limit raised to 200M.
    # Reason: Hamburg delivers >100 MB XML per quarter. The original 60s Nginx timeout
    # caused uploads to fail before Gunicorn even finished writing the file to disk.
    # File is streamed chunk-by-chunk (1 MB) to avoid RAM exhaustion.
    proxy_read_timeout 300;
    proxy_send_timeout 300;
    client_max_body_size 200M;
  }

  include /etc/nginx/extra-conf.d/*.conf;
}
